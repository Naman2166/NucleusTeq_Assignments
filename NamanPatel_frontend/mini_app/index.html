<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Product Inventory Dashboard</h1>
    </header>


    <hr>


    <!-- This is main content area-->
    <div id="main_content">

        <!-- Control section -->
        <section>
            <h2>Controls</h2> <br>

            <div class="controls">
                
                <!-- it is search bar, using this we can search for any product -->
                <div>
                    <label>Search:</label> 
                    <br>
                    <input type="text" id="search" placeholder="Search product...">
                </div>

                <!-- this is category filter where we can choose between different categories, here categories will added or deleted dynamically using js file  -->
                <div>
                    <label>Category:</label><br>
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <!-- it is lowstock filter, it shows product having stock less than 5 -->
                <div>
                    <label> Low Stock: </label> <br>
                    <select id="lowStockFilter">
                        <option value="">Default</option>
                        <option value="Yes">Apply Filter (Stock < 5)</option>
                    </select>
                </div>

                <!-- this is sort filter, where we can sort product according to price or alphabetical order -->
                <div>
                    <label>Sort:</label> <br>
                    <select id="sort">
                        <option value="">Default</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="name-az">A → Z</option>
                        <option value="name-za">Z → A</option>
                    </select>
                </div>
                
                <!-- this button clears all data filled by user  -->
                <button id="clearAllBtn">Clear</button>

            </div>
        </section>


        <hr>


         <!-- Analytics Section -->
        <section>
            <h2>Analytics</h2> <br>
         
            <!-- this section will show no. of total products, total value of all products, out of stock products, no. of categories  -->
            <div class="analytics">
              <p>Total Products: <span id="totalProducts">0</span> </p>
              <p>Total Value: <span id="totalValue">0</span> </p>
              <p>Out of Stock: <span id="outOfStock">0</span> </p>
              <p>Categories: <span id="categoryCount">0</span> </p>
            </div>
        </section>


        <hr>
        
        <!-- this is a loading spinner which displays while fetching product data -->
        <div id="loader">
            <div class="spinner"></div>
        </div>


        <!-- Product Grid -->
        <section>
            <h2>Products</h2> <br>
            
            <!-- if this is no product then "no product found" message will display -->
            <p id="noProductMessage">
                No products found
            </p>
             
            <!-- this div will conatains actual products which will be added or removed dynamically using js  -->
            <div id="productGrid"> </div>
        </section>


        <hr>
        


        <!-- Add Product -->
        <section>
            <h2>Add Product</h2> <br>

            <!-- this is a form which takes data from user such as product name, price, no. of stock, category to add a new product -->
            <form id="addProductForm">

                <div>
                    <label>Product Name:</label><br>
                    <input type="text" id="productName" required>
                </div>

                <div>
                    <label>Price (Rs):</label><br>
                    <input type="number" id="productPrice" required>
                </div>

                <div>
                    <label>Stock:</label><br>
                    <input type="number" id="productStock" required>
                </div>
                
                <!-- this is a drowndrop menu where we can select category of a product -->
                <div>
                    <label>Category:</label><br>
                    <select id="productCategory" required>
                        <option value="">Select category:</option>
                    </select>
                </div>

                <button type="submit" id="addProductBtn">Add</button>

            </form>
        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
