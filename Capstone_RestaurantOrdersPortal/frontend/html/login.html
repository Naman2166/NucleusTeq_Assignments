<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <div class="auth-container">

        <p class="close-btn-login" onclick="goHome()">X</p>

        <div class="auth-left">
            <h1>Welcome Back</h1>
            <p>
                Login to continue your ordering journey
                Customers can place orders and track status
                Restaurant owners can manage menus and orders
            </p>
        </div>


        <div class="auth-box">
            <h2>Login</h2>

            <form id="loginForm">
                <div>
                    <label>Email</label>
                    <input id="email" type="email" placeholder="Enter email">
                </div>

                <div>
                    <label>Password</label>
                    <input id="password" type="password" placeholder="Enter password">
                </div>
                <button type="submit" class="full-width">Login</button>
            </form>

            <p id="errorMsg" class="error-msg"></p>
            <p id="successMsg" class="success-msg"></p>

            <p class="bottom-text">
                Don't have an account?
                <a href="register.html">Register</a>
            </p>
        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>

</body>

</html>
